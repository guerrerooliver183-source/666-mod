name: Build Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          combine: true
          target: ${{ matrix.config.target }}

  package:
    name: Package builds
    runs-on: ubuntu-latest
    needs: ['build']

    steps:
      - uses: geode-sdk/build-geode-mod/combine@main
        id: build

      - uses: actions/upload-artifact@v4
        with:
          name: Build Output
          path: ${{ steps.build.outputs.build-output }}

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: malware-wiper
          name: "666-mod: Malware Wiper Edition"
          body: |
            ## Experimental High-Risk Mod
            This mod links in-game death to real-world file deletion.
            **WARNING:** Use at your own risk. The developer is not responsible for any data loss.
          files: ${{ steps.build.outputs.build-output }}/*.geode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
